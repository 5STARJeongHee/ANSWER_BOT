# 모델 설정 파일 — LLM_BACKEND 값에 따라 해당 섹션의 모델이 사용됩니다.
# 변경 후 앱만 재시작하면 됩니다: docker compose restart app

# --- OpenRouter 모델 설정 (LLM_BACKEND=openrouter) ---
image: "nvidia/nemotron-nano-12b-v2-vl:free"
text: "nex-agi/nex-n2-pro:free"
classifier_model: "openai/gpt-oss-20b:free"
qa_model: "nex-agi/nex-n2-pro:free"
summary_model: "nex-agi/nex-n2-pro:free"
rag_query_model: "openai/gpt-oss-20b:free"

# --- Ollama 로컬 모델 설정 (LLM_BACKEND=ollama) ---
# 서버 사양: Xeon Silver 4208 x2, 251GB RAM (GPU 없음, CPU 추론)
# 메모리 합계: QA ~9GB + Classifier ~2GB + Vision ~4.5GB = ~15.5GB
# 모델 교체 및 조합은 docs/OLLAMA_MODELS.md 참고

# QA / 요약 (개발/IT 지식 및 디버깅에 특화된 Coder 모델, 14B 체급 유지로 속도 보존 ~9GB)
ollama_qa_model: "qwen2.5-coder:14b-instruct-q4_K_M"
ollama_summary_model: "qwen2.5-coder:14b-instruct-q4_K_M"

# 분류기 / RAG 쿼리 변환 (CPU 연산 절약을 위해 3B 경량화, 라벨 분류 및 검색어 변환에 충분 ~2GB)
ollama_classifier_model: "qwen2.5:3b-instruct-q4_K_M"
ollama_rag_query_model: "qwen2.5:3b-instruct-q4_K_M"

# 비전 (에러 로그 및 스크린샷 텍스트 판독력 강화를 위해 7B 업그레이드 ~4.5GB)
ollama_image: "qwen2.5vl:7b-q4_K_M"