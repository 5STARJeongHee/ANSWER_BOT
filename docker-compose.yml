# Docker Compose - Slack QNA BOT (Supabase 호스팅 DB 사용, 로컬 DB 없음)
version: "3.9"

services:
  app:
    build:
      context: ./slack_bot
      dockerfile: Dockerfile
    container_name: slackbot_app
    restart: unless-stopped
    env_file:
      # 루트의 .env 파일에서 환경변수 로드 (secrets 포함)
      - ./.env
    environment:
      MODEL_CONFIG_PATH: /app/properties.txt
    volumes:
      - ./properties.txt:/app/properties.txt:ro
      # fastembed 모델 캐시 (재시작 시 재다운로드 방지)
      - fastembed_cache:/root/.cache/fastembed
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  fastembed_cache:
    driver: local
