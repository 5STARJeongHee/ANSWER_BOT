# Docker Compose - Slack QNA BOT + PostgreSQL(pgvector)
version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: slackbot_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-slackbot}
      POSTGRES_USER: ${POSTGRES_USER:-slackbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-slackbot} -d ${POSTGRES_DB:-slackbot}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build:
      context: ./slack_bot
      dockerfile: Dockerfile
    container_name: slackbot_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      # .env의 DATABASE_URL을 Docker 내부 네트워크 주소로 덮어씀
      DATABASE_URL: postgresql://${POSTGRES_USER:-slackbot}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-slackbot}
      MODEL_CONFIG_PATH: /app/properties.yml
      ENABLE_VECTOR_SEARCH: "true"
      # LLM 백엔드: openrouter(기본) 또는 ollama
      LLM_BACKEND: ${LLM_BACKEND:-openrouter}
      # Ollama 사용 시 컨테이너 내부 서비스 주소 (호스트 직접 실행이면 http://host.docker.internal:11434/v1)
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434/v1}
    volumes:
      - ./properties.yml:/app/properties.yml:ro
      - fastembed_cache:/root/.cache/fastembed
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  ollama:
    image: ollama/ollama:latest
    container_name: slackbot_ollama
    restart: unless-stopped
    profiles:
      - ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    # CPU 전용 서버이므로 GPU 설정 없음. AVX512는 llama.cpp가 자동 감지.

volumes:
  pgdata:
    driver: local
  fastembed_cache:
    driver: local
  ollama_models:
    driver: local
