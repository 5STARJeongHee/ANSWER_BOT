# Docker Compose - Slack QNA BOT + PostgreSQL(pgvector) + SearXNG
version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: slackbot_db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-slackbot}
      POSTGRES_USER: ${POSTGRES_USER:-slackbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-slackbot} -d ${POSTGRES_DB:-slackbot}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build:
      context: ./slack_bot
      dockerfile: Dockerfile
    container_name: slackbot_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      # .env의 DATABASE_URL을 Docker 내부 네트워크 주소로 덮어씀
      DATABASE_URL: postgresql://${POSTGRES_USER:-slackbot}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-slackbot}
      MODEL_CONFIG_PATH: /app/properties.yml
      ENABLE_VECTOR_SEARCH: "true"
      # LLM 백엔드: openrouter(기본) 또는 ollama
      LLM_BACKEND: ${LLM_BACKEND:-openrouter}
      # Ollama 사용 시 컨테이너 내부 서비스 주소 (호스트 직접 실행이면 http://host.docker.internal:11434/v1)
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434/v1}
      REDIS_URL: redis://redis:6379/0
      METRICS_PORT: 8000
      SEARCH_PROVIDER: ${SEARCH_PROVIDER:-searxng}
      SEARXNG_URL: http://searxng:8080
    ports:
      - "28000:8000"
    volumes:
      - ./properties.yml:/app/properties.yml:ro
      - fastembed_cache:/root/.cache/fastembed
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  ollama:
    image: ollama/ollama:latest
    container_name: slackbot_ollama
    restart: unless-stopped
    profiles:
      - ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    # 👇 [추가] 서비스 보호를 위한 안전장치 환경 변수
    environment:
      - OMP_NUM_THREADS=8
      - LLAMA_ARG_THREADS=8
    # 👇 [추가] 도커 수준에서의 CPU 및 RAM 하드 한도 지정 (Compose v3 버전 이상 기준)
    deploy:
      resources:
        limits:
          cpus: '8.0'        # 전체 32스레드 중 딱 8개만큼의 연산력만 허용 (25% 제한)
          memory: 32gb       # LLM 스택이 순간적으로 폭주해도 최대 32GB까지만 메모리 허용
    # CPU 전용 서버이므로 GPU 설정 없음. AVX512는 llama.cpp가 자동 감지.

  redis:
    image: redis:7-alpine
    container_name: slackbot_redis
    restart: unless-stopped
    ports:
      - "26379:6379"
    volumes:
      - redis_data:/data

  searxng:
    image: searxng/searxng:latest
    container_name: slackbot_searxng
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080/
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY:-please-change-this-secret-key}
      - SEARXNG_REDIS_URL=redis://redis:6379/1
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro

volumes:
  pgdata:
    driver: local
  fastembed_cache:
    driver: local
  ollama_models:
    driver: local
  redis_data:
    driver: local
